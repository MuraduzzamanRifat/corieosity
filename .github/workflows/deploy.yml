name: Deploy to HostGator

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build # next build + scripts/fix-next-folder.mjs (renames _next -> next)

      - name: Deploy out/ to HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: gator4163.hostgator.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out/
          # DIAGNOSED 2026-07-21: the FTP account in FTP_USERNAME is rooted in a
          # directory that is NOT the site's web root (public_html) and can't reach
          # it — uploads report success but never appear on corieosity.com. Both
          # "./" and "public_html/" were tested; neither reached the web root.
          # FIX (needs cPanel): recreate the FTP account with Directory = public_html
          # (then "./" below is correct), OR put the MAIN cPanel account's FTP creds
          # in FTP_USERNAME/FTP_PASSWORD and set server-dir to "public_html/".
          server-dir: ./
          log-level: verbose
          # Never touch SSL validation files or the one-off perms script.
          exclude: |
            **/.well-known/**
            **/perms.php
