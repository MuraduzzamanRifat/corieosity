name: Deploy to HostGator

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build # next build + scripts/fix-next-folder.mjs (renames _next -> next)

      - name: Deploy out/ to HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: gator4163.hostgator.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out/
          # The FTP login lands in the account's HOME dir, not the web root, so we
          # target public_html/ explicitly. If this account is instead chrooted to
          # public_html already, change this back to "./". (Diagnosed 2026-07-21:
          # with "./" the uploads never reached the live web root.)
          server-dir: public_html/
          log-level: verbose
          # Never touch SSL validation files or the one-off perms script.
          exclude: |
            **/.well-known/**
            **/perms.php
