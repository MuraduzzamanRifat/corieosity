name: Deploy to HostGator

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build # next build + scripts/fix-next-folder.mjs (renames _next -> next)

      - name: Deploy out/ to HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: gator4163.hostgator.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out/
          # server-dir is "./" when the FTP account is scoped to the corieosity.com
          # folder. If you use the main cPanel FTP account instead, change this to
          # "./corieosity.com/".
          server-dir: ./
          # Never touch SSL validation files or the one-off perms script.
          exclude: |
            **/.well-known/**
            **/perms.php
